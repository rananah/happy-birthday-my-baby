<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Birthday Scrapbook</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f7f5ed;font-family:system-ui;overflow-x:hidden}
.page{position:absolute;inset:0;overflow:auto;padding:18px;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateX(60px);pointer-events:none;transition:.7s ease}
.page.active{opacity:1;transform:translateX(0);pointer-events:auto}
img{width:min(100%,1200px);height:auto;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.controls{display:flex;gap:12px;flex-wrap:wrap;margin:20px}
button{padding:14px 26px;border:none;border-radius:999px;background:#b21f45;color:#fff;font-size:1rem}
.spotify{width:min(100%,700px);margin:20px auto}
.heartRain,.clickHeart{position:fixed;pointer-events:none}
.heartRain{top:-30px;color:#fff;animation:fall linear infinite;text-shadow:0 0 5px #fff}
@keyframes fall{to{transform:translateY(110vh)}}
.clickHeart{font-size:24px;animation:pop 1s forwards}
@keyframes pop{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:translateY(-80px) scale(1.8)}}
.note{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#fff;padding:10px 16px;border-radius:12px;display:none;box-shadow:0 5px 15px rgba(0,0,0,.2)}
.hotspot{position:absolute;cursor:pointer}
#hs1{left:8%;top:10%;width:18%;height:18%}
#hs2{left:70%;top:5%;width:18%;height:18%}
.wrap{position:relative;width:min(100%,1200px)}
</style></head><body>
<div id='msg' class='note'></div>
<section id='p1' class='page active'><h1>Happy Birthday ❤️</h1>
<div class='wrap'>
<img src='assets/page1.png'>
<div id='hs1' class='hotspot' onclick="egg('🐸 Secret: You will always be my favorite little frog.')"></div>
<div id='hs2' class='hotspot' onclick="egg('💋 Secret unlocked: Every sticker here reminds me of you.')"></div>
</div>
<div class='controls'><button onclick='go(2)'>Continue ➜</button></div></section>
<section id='p2' class='page'><h1>More Memories</h1>
<div class='wrap'>
<img src='assets/page2.png'>
<div id='hs1' class='hotspot' onclick="egg('🎂 Birthday wish: May every year be kinder than the last.')"></div>
<div id='hs2' class='hotspot' onclick="egg('🤍 Hidden message: I hope this scrapbook always makes you smile.')"></div>
</div>
<div class='spotify'><iframe style='border-radius:12px' src='https://open.spotify.com/embed/track/1dGr1c8CrMLDpV6mPbImSI?utm_source=generator&si=d87677fa1a5d47c1' width='100%' height='352' frameborder='0' allow='autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture'></iframe></div>
<div class='controls'><button onclick='go(1)'>⬅ Return</button></div></section>
<script>
function go(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('p'+n).classList.add('active');scrollTo(0,0);}
for(let i=0;i<90;i++){let h=document.createElement('div');h.className='heartRain';h.innerHTML='♡';h.style.left=Math.random()*100+'vw';h.style.fontSize=(10+Math.random()*18)+'px';h.style.animationDuration=(6+Math.random()*8)+'s';h.style.animationDelay=(-Math.random()*10)+'s';document.body.appendChild(h);}
document.addEventListener('click',e=>{for(let i=0;i<6;i++){let h=document.createElement('div');h.className='clickHeart';h.innerHTML='♡';h.style.left=(e.clientX+(Math.random()*40-20))+'px';h.style.top=(e.clientY+(Math.random()*40-20))+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),1000);}});
function egg(t){let m=document.getElementById('msg');m.textContent=t;m.style.display='block';clearTimeout(window.tt);window.tt=setTimeout(()=>m.style.display='none',3000);}
</script></body></html>
